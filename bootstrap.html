<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Webpage</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .box{
            height:80px;
            font-size:30px;
            font-weight:bold;
            color:rgba(0, 7, 12, 0.895);
            display:flex;
            justify-content:center;
            align-items:center;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <!-- First Row -->
    <div class="row">
        <div class="col-md-6 box bg-primary">
            bootstrap webpage
        </div>

        <div class="col-md-6 box bg-success">
            bootstrap webpage
        </div>
    </div>

    <!-- Second Row -->
    <div class="row mt-2">

        <div class="col-md-4 box bg-success">
            bootstrap webpage
        </div>

        <div class="col-md-4 box bg-danger">
            bootstrap webpage
        </div>

        <div class="col-md-4 box bg-warning">
            bootstrap webpage
        </div>

    </div>

</div>

</body>
</html>
