<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management System</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 800px;
        margin: 20px auto;
        padding: 0 20px;
        background-color: #f4f4f9;
      }
      h1,
      h2 {
        color: #333;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* Form Styles */
      .card {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      .form-group {
        margin-bottom: 10px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input,
      select {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        cursor: pointer;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        font-weight: bold;
      }

      .btn-add {
        background-color: #28a745;
        color: white;
        width: 100%;
      }
      .btn-add:hover {
        background-color: #218838;
      }

      /* Controls */
      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .search-box {
        flex: 1;
      }
      .filter-box {
        flex: 1;
      }
      .btn-filter {
        background-color: #007bff;
        color: white;
      }
      .btn-reset {
        background-color: #6c757d;
        color: white;
      }

      /* Table Styles */
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: white;
      }
      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #ddd;
      }
      th {
        background-color: #007bff;
        color: white;
      }
      tr:hover {
        background-color: #f1f1f1;
      }

      .btn-delete {
        background-color: #dc3545;
        color: white;
        padding: 5px 10px;
        font-size: 12px;
      }
      .btn-delete:hover {
        background-color: #c82333;
      }

      .no-record {
        text-align: center;
        color: #666;
        margin: 20px 0;
        font-style: italic;
      }
      .stats {
        margin-top: 10px;
        font-weight: bold;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>Student Management System</h1>

    <div class="container">
      <!-- Add Student Form -->
      <div class="card">
        <h2>Add New Student</h2>
        <form id="studentForm">
          <div class="form-group">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              required
              placeholder="Enter student name"
            />
          </div>
          <div class="form-group">
            <label for="branch">Branch</label>
            <select id="branch" required>
              <option value="">Select Branch</option>
              <option value="CS">Computer Science</option>
              <option value="EE">Electrical Engineering</option>
              <option value="ME">Mechanical Engineering</option>
              <option value="CE">Civil Engineering</option>
            </select>
          </div>
          <button type="submit" class="btn-add">Add Student</button>
        </form>
      </div>

      <!-- Search and Filter -->
      <div class="card">
        <h2>Search & Filter</h2>
        <div class="controls">
          <input
            type="text"
            id="searchInput"
            class="search-box"
            placeholder="Search by name..."
          />
          <select id="filterBranch" class="filter-box">
            <option value="">All Branches</option>
            <option value="CS">Computer Science</option>
            <option value="EE">Electrical Engineering</option>
            <option value="ME">Mechanical Engineering</option>
            <option value="CE">Civil Engineering</option>
          </select>
          <button onclick="applyFilters()" class="btn-filter">Apply</button>
          <button onclick="resetFilters()" class="btn-reset">Reset</button>
        </div>
        <div id="totalStudents" class="stats">Total Students: 0</div>
      </div>

      <!-- Student List -->
      <div class="card">
        <h2>Student List</h2>
        <table id="studentTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Branch</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="studentListBody">
            <!-- Data will be inserted here -->
          </tbody>
        </table>
        <div id="noRecord" class="no-record" style="display: none">
          No records found.
        </div>
      </div>
    </div>

    <script>
      // Initialize students array from LocalStorage or empty
      let students = JSON.parse(localStorage.getItem("students")) || [];

      const form = document.getElementById("studentForm");
      const listBody = document.getElementById("studentListBody");
      const noRecordMsg = document.getElementById("noRecord");
      const totalDisplay = document.getElementById("totalStudents");
      const searchInput = document.getElementById("searchInput");
      const filterBranch = document.getElementById("filterBranch");

      // Function to save to LocalStorage
      function saveData() {
        localStorage.setItem("students", JSON.stringify(students));
        renderTable();
      }

      // Add Student
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const name = document.getElementById("name").value;
        const branch = document.getElementById("branch").value;

        if (name && branch) {
          students.push({ id: Date.now(), name, branch });
          form.reset();
          saveData();
        }
      });

      // Delete Student
      function deleteStudent(id) {
        if (confirm("Are you sure you want to delete this student?")) {
          students = students.filter((student) => student.id !== id);
          saveData();
        }
      }

      // Apply Search and Filter
      function applyFilters() {
        renderTable();
      }

      function resetFilters() {
        searchInput.value = "";
        filterBranch.value = "";
        renderTable();
      }

      // Render Table
      function renderTable() {
        listBody.innerHTML = "";
        const searchTerm = searchInput.value.toLowerCase();
        const branchFilter = filterBranch.value;

        // Filter Logic
        const filteredStudents = students.filter((student) => {
          const matchesName = student.name.toLowerCase().includes(searchTerm);
          const matchesBranch =
            branchFilter === "" || student.branch === branchFilter;
          return matchesName && matchesBranch;
        });

        // Update Total Count
        totalDisplay.textContent = `Total Students: ${filteredStudents.length}`;

        // Show/Hide No Record Message
        if (filteredStudents.length === 0) {
          noRecordMsg.style.display = "block";
        } else {
          noRecordMsg.style.display = "none";

          // Populate Table
          filteredStudents.forEach((student) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                        <td>${student.name}</td>
                        <td>${student.branch}</td>
                        <td><button class="btn-delete" onclick="deleteStudent(${student.id})">Delete</button></td>
                    `;
            listBody.appendChild(row);
          });
        }
      }

      // Event Listeners for real-time filtering (optional, can remove if you only want button click)
      searchInput.addEventListener("input", renderTable);
      filterBranch.addEventListener("change", renderTable);

      // Initial Render
      renderTable();
    </script>
  </body>
</html>
