<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of N Numbers</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; line-height: 1.6; }
        .container { max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input { padding: 8px; width: 80%; margin-bottom: 10px; }
        button { padding: 8px 15px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 4px; }
        #displayResult { margin-top: 20px; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sum of N Numbers</h2>
    <p>Enter a value for N:</p>
    <input type="number" id="userInput" placeholder="Enter a number">
    <button onclick="calculateSum()">Calculate</button>

    <div id="displayResult"></div>
</div>

<script>
    function calculateSum() {
        // 1. Get value N from user input
        let n = document.getElementById("userInput").value;
        let sum = 0;
        let resultDiv = document.getElementById("displayResult");

        // Validation to check if input is a valid number
        if (n === "" || n <= 0) {
            resultDiv.innerHTML = "Please enter a positive number.";
            return;
        }

        n = parseInt(n);

        // 2. Use a loop to calculate sum from 1 to N
        for (let i = 1; i <= n; i++) {
            sum += i;
        }

        // 3. Display the result dynamically
        resultDiv.innerHTML = "The sum of numbers from 1 to " + n + " is: " + sum;
    }
</script>

</body>
</html>
